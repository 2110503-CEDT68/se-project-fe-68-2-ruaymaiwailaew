name: Security Check

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write
  security-events: write
  actions: read

jobs:
  secret-scanning:
    name: Secret Scanning (TruffleHog + Gitleaks)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  codeql-scan:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ (github.event_name == 'pull_request' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')) && !cancelled() }}
    strategy:
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scan:
    name: Dependency Check (OWASP)
    runs-on: ubuntu-latest
    needs: [secret-scanning, codeql-scan]
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5

      - name: Install npm dependencies
        run: npm ci

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: 'se-project-fe-68-2-ruaymaiwailaew'
          path: '.'
          format: 'SARIF'
          out: 'reports'
          args: >
            --failOnCVSS 7.0
            --enableRetired

      - name: Upload Dependency-Check SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      - name: Upload Dependency-Check reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: reports/