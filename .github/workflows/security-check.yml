name: Security Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CODEQL_ACTION_FILE_COVERAGE_ON_PRS: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write
  security-events: write
  actions: read

jobs:
  secret-scanning:
    name: Secret Scanning (TruffleHog + Gitleaks)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  codeql-scan:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')) && !cancelled() }}
    strategy:
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  dependency-scan:
    name: Dependency Scan (Snyk)
    runs-on: ubuntu-latest
    needs: [secret-scanning, codeql-scan]
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')) && !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5

      - name: Install npm dependencies
        run: npm ci

      - name: Run Snyk test
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --sarif-file-output=snyk-results.sarif

      - name: Upload Snyk SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-results.sarif
          category: snyk

      - name: Upload Snyk SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-results.sarif