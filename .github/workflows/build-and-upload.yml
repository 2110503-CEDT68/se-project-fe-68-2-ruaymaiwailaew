name: build upload and deploy

on:
  push:
    branches:
      [main]
  pull_request:
    branches:
      [main]

env:
  IMAGE_NAME: g26-se-project-fe-68-2
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run build and check
        run: npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
            scan-type: image
            image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
            severity: CRITICAL
            exit-code: '1'
            ignore-unfixed: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          FULL=${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME
          docker tag $IMAGE_NAME:${{ github.sha }} $FULL:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $FULL:latest
          docker push $FULL:${{ github.sha }}
          docker push $FULL:latest

  deploy:
    name: Send Deployment signal
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: github.event_name == 'push'

    steps:
      - name: Send Webhook via Cloudflare Tunnel
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}" \
          "${{ secrets.WEBHOOK_URL }}"